name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m compileall -q app tests tools
      - run: HARBOR_INTERNAL_WORKER_TOKEN=test-token python -m unittest discover -s tests -q
      - run: ruff check app tests tools
      - run: mypy app/state.py app/jobs.py app/sources.py app/backup.py app/preflight.py app/observability.py app/auth.py --ignore-missing-imports --follow-imports=skip
      - run: python tools/security_check.py
      - run: pip-audit

  package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: harbor-package
          path: dist/*
